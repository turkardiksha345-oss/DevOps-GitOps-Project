name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  MANIFEST_REPO: "turkardiksha345-oss/manifest-repo"
  GIT_EMAIL: "github-actions@github.com"
  GIT_NAME: "GitHub Actions"

jobs:

# =========================
# 1️⃣ BUILD + SAST + SCA
# =========================
  build_sast_sca:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Build Backend
        run: |
          cd Application/backend
          mvn clean install -DskipTests

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: Application/backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN1 }}

      - name: Install Snyk
        run: npm install -g snyk

      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Test
        run: |
          cd Application/backend
          snyk test || true

# =========================
# 2️⃣ BUILD DOCKER + SCAN
# =========================
  build_and_scan:
    runs-on: ubuntu-latest
    needs: build_sast_sca

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Backend Image
        run: docker build -t $DOCKER_USERNAME/student-backend:${{ github.sha }} Application/backend

      - name: Build Frontend Image
        run: docker build -t $DOCKER_USERNAME/student-frontend:${{ github.sha }} Application/frontend

      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/student-backend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/student-frontend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0

# =========================
# 3️⃣ PUSH IMAGES (FIXED 🔥)
# =========================
  push_images:
    runs-on: ubuntu-latest
    needs: build_and_scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔥 IMPORTANT: BUILD AGAIN
      - name: Build Backend Image
        run: docker build -t $DOCKER_USERNAME/student-backend:${{ github.sha }} Application/backend

      - name: Build Frontend Image
        run: docker build -t $DOCKER_USERNAME/student-frontend:${{ github.sha }} Application/frontend

      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Backend
        run: docker push $DOCKER_USERNAME/student-backend:${{ github.sha }}

      - name: Push Frontend
        run: docker push $DOCKER_USERNAME/student-frontend:${{ github.sha }}

# =========================
# 4️⃣ GITOPS UPDATE
# =========================
  update_manifest:
    runs-on: ubuntu-latest
    needs: push_images
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v3
        with:
          repository: ${{ env.MANIFEST_REPO }}
          token: ${{ secrets.GIT_TOKEN }}
          path: manifest

      - name: Update Backend Image
        run: |
          cd manifest/argocd
          sed -i "s|image: .*|image: $DOCKER_USERNAME/student-backend:${{ github.sha }}|g" app.yaml

      - name: Update Frontend Image
        run: |
          cd manifest/argocd
          sed -i "s|image: .*|image: $DOCKER_USERNAME/student-frontend:${{ github.sha }}|g" app.yaml

      - name: Commit & Push
        run: |
          cd manifest
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
          git add .
          git commit -m "Update images to ${{ github.sha }}" || echo "No changes"
          git push origin main

# =========================
# 4️⃣ DAST SCAN (STACKHAWK)
# =========================

  dast_scan:
    runs-on: ubuntu-latest
    needs: build_and_scan   # runs after build & scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🐳 Start Application using Docker Compose
      - name: Start Application
        run: docker compose -f Application/docker-compose.yml up -d

      # ⏳ Wait for Backend to be ready
      - name: Wait for Backend
        run: sleep 40

      # 🔍 Debug (optional but useful)
      - name: Check Running Containers
        run: docker ps

      # 🦅 StackHawk Scan
      - name: Run StackHawk Scan
        uses: stackhawk/hawkscan-action@v2
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}

      - name: Debug Containers
        run: |
          docker ps
          docker logs student_backend