name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  MANIFEST_REPO: 'turkardiksha345-oss/manifest-repo'
  GIT_EMAIL: 'github-actions@github.com'
  GIT_NAME: 'GitHub Actions'

jobs:

# =========================
# 1️⃣ SAST + SCA
# =========================
  sast_sca:
    name: SAST & SCA Scanning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # ✅ SonarCloud (FIXED)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: Application/backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN1 }}

      # ✅ Snyk
      - name: Install Snyk
        run: npm install -g snyk

      - name: Snyk Auth
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Test
        run: |
          cd Application/backend
          snyk test || true

# =========================
# 2️⃣ BUILD + SCAN
# =========================
  build_and_scan:
    name: Build & Container Scan
    runs-on: ubuntu-latest
    needs: sast_sca

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # ✅ Build Backend
      - name: Build Backend
        run: |
          cd Application/backend
          mvn clean install -DskipTests

      # ✅ Build Docker Images
      - name: Build Backend Image
        run: docker build -t $DOCKER_USERNAME/backend:${{ github.sha }} Application/backend

      - name: Build Frontend Image
        run: docker build -t $DOCKER_USERNAME/frontend:${{ github.sha }} Application/frontend

      # ✅ Trivy Scan
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/backend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USERNAME }}/frontend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

# =========================
# 3️⃣ PUSH IMAGES
# =========================
  push_images:
    name: Push Docker Images
    runs-on: ubuntu-latest
    needs: build_and_scan
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Docker Login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Backend Image
        run: |
          docker push $DOCKER_USERNAME/backend:${{ github.sha }}

      - name: Push Frontend Image
        run: |
          docker push $DOCKER_USERNAME/frontend:${{ github.sha }}

# =========================
# 4️⃣ GITOPS (MANIFEST UPDATE)
# =========================
  update_manifest:
    name: GitOps - Update Manifest Repo
    runs-on: ubuntu-latest
    needs: push_images
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v3
        with:
          repository: ${{ env.MANIFEST_REPO }}
          token: ${{ secrets.GIT_TOKEN }}
          path: manifest

      - name: Update Backend Image
        run: |
          cd manifest/backend
          sed -i "s|image: .*|image: $DOCKER_USERNAME/backend:${{ github.sha }}|g" deployment.yaml

      - name: Update Frontend Image
        run: |
          cd manifest/frontend
          sed -i "s|image: .*|image: $DOCKER_USERNAME/frontend:${{ github.sha }}|g" deployment.yaml

      - name: Commit & Push
        run: |
          cd manifest
          git config user.name "$GIT_NAME"
          git config user.email "$GIT_EMAIL"
          git add .
          git commit -m "Update images to ${{ github.sha }}" || echo "No changes"
          git push origin main